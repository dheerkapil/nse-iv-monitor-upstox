name: Fetch Upstox Option Chain Data

on:
  schedule:
    # Every 15 minutes from 4:00 to 10:00 UTC = 9:30 AM to 3:30 PM IST (Mon-Fri)
    - cron: '*/15 4-10 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-options:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: option-chain-data-${{ github.run_id }}
          path: data/*.csv
          retention-days: 7
